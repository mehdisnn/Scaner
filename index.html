<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Barcode Scanner</title>

<style>

body{

    margin:0;
    padding:15px;
    font-family:tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;

}

/* ---------- دوربین ---------- */

#scanner-container{

    width:100%;
    display:flex;
    justify-content:center;
    margin-top:10px;

}

#scanner{

    width:360px;
    max-width:95%;
    height:260px;
    overflow:hidden;
    border-radius:15px;
    border:3px solid #ccc;
    background:black;

}

/* ---------- خط ---------- */

#line{

    width:360px;
    max-width:95%;
    height:4px;
    background:red;
    margin:8px auto 20px auto;
    border-radius:10px;
    transition:0.2s;

}

#line.detected{

    background:limegreen;

}

/* ---------- لیست ---------- */

#productList{

    margin-top:20px;

}

.product{

    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

/* ---------- بارکد ---------- */

.barcode{

    font-size:26px;
    font-weight:bold;
    margin-bottom:12px;

}

/* ---------- فیلدها ---------- */

.fields{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

}

.field{

    flex:1;
    min-width:120px;

}

.field label{

    display:block;
    margin-bottom:5px;
    font-size:16px;
    font-weight:bold;

}

.field input{

    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    font-size:28px;
    text-align:center;
    font-weight:bold;
    color:white;

}

/* قیمت اصلی */

.original-price{

    background:#d32f2f;

}

/* قیمت تخفیف */

.discount-price{

    background:#2e7d32;

}

/* تعداد */

.count-box{

    background:#1565c0;

}

</style>

</head>

<body>

<h2>
اسکن بارکد
</h2>

<!-- دوربین -->

<div id="scanner-container">

    <div id="scanner"></div>

</div>

<!-- خط -->

<div id="line"></div>

<!-- لیست محصولات -->

<div id="productList"></div>

<!-- صدای بوق -->

<audio id="beep">

<source
src="https://actions.google.com/sounds/v1/cartoon/beep_short.ogg">

</audio>

<!-- Quagga -->

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<script>

/* جلوگیری از اسکن پشت سر هم */

let detectedRecently = false;

/* ---------------- راه‌اندازی دوربین ---------------- */
/* همون الگوریتم قبلی خودت */

Quagga.init({

    inputStream:{

        name:"Live",

        type:"LiveStream",

        target:
            document.querySelector("#scanner"),

        constraints:{

            facingMode:"environment"

        }

    },

    decoder:{

        readers:[

            "ean_reader",

            "code_128_reader"

        ]

    }

},

async function(err){

    if(err){

        console.log(err);

        alert("خطا در راه‌اندازی دوربین");

        return;

    }

    Quagga.start();

    enableCameraFeatures();

});

/* ---------------- هنگام تشخیص ---------------- */
/* همون ساختار قبلی */

Quagga.onDetected(async function(data){

    if(detectedRecently) return;

    detectedRecently = true;

    const code =
        data.codeResult.code;

    /* بوق موفقیت */

    const beep =
        document.getElementById("beep");

    beep.currentTime = 0;

    beep.play();

    /* خط سبز */

    const line =
        document.getElementById("line");

    line.classList.add("detected");

    /* دریافت اطلاعات */

    const product =
        await getProductFromSheet(code);

    /* افزودن به لیست */

    addProduct(product);

    navigator.vibrate?.(150);

    setTimeout(()=>{

        line.classList.remove("detected");

        detectedRecently = false;

    },1000);

});

/* ---------------- گوگل شیت ---------------- */

/*

ستون ها:

A = barcode
B = original_price
C = discount_price

*/

/* آدرس فایل */

const SHEET_URL =
"https://opensheet.elk.sh/SPREADSHEET_ID/Sheet1";

/*
به جای
SPREADSHEET_ID
آیدی گوگل شیت خودت را قرار بده
*/

async function getProductFromSheet(barcode){

    try{

        const response =
            await fetch(SHEET_URL);

        const data =
            await response.json();

        const item =
            data.find(x => x.barcode == barcode);

        if(item){

            return {

                barcode: barcode,

                originalPrice:
                    item.original_price,

                discountPrice:
                    item.discount_price

            };

        }

    }

    catch(e){

        console.log(e);

    }

    return {

        barcode: barcode,

        originalPrice:"ناموجود",

        discountPrice:"ناموجود"

    };

}

/* ---------------- افزودن محصول ---------------- */

function addProduct(product){

    const container =
        document.getElementById("productList");

    const div =
        document.createElement("div");

    div.className = "product";

    div.innerHTML = `

        <div class="barcode">

            ${product.barcode}

        </div>

        <div class="fields">

            <div class="field">

                <label>

                    قیمت پشت کالا

                </label>

                <input

                    class="original-price"

                    value="${product.originalPrice}"

                    readonly

                >

            </div>

            <div class="field">

                <label>

                    قیمت تخفیفی

                </label>

                <input

                    class="discount-price"

                    value="${product.discountPrice}"

                    readonly

                >

            </div>

            <div class="field">

                <label>

                    تعداد

                </label>

                <input

                    class="count-box"

                    type="number"

                    value="1"

                >

            </div>

        </div>

    `;

    container.prepend(div);

}

/* ---------------- autofocus + zoom ---------------- */
/* همون کد قبلی خودت */

async function enableCameraFeatures(){

    try{

        const track =
            Quagga.CameraAccess.getActiveTrack();

        const capabilities =
            track.getCapabilities();

        const advanced = [];

        /* فوکوس پیوسته */

        if(capabilities.focusMode){

            advanced.push({

                focusMode:"continuous"

            });

        }

        /* زوم */

        if(capabilities.zoom){

            advanced.push({

                zoom:2

            });

        }

        await track.applyConstraints({

            advanced:advanced

        });

    }

    catch(e){

        console.log(e);

    }

}

</script>

</body>

</html>
