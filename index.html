<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    text-align:center;
}

.container{
    padding:15px;
}

h2{
    margin-top:10px;
}

button{
    background:#e53935;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 24px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#videoContainer{
    position:relative;
    width:95%;
    max-width:650px;
    margin:auto;
    overflow:hidden;
    border-radius:18px;
    background:black;
}

video{
    width:100%;
    display:block;
    object-fit:cover;
}

/* ناحیه اسکن */

#scanBox{
    position:absolute;
    top:35%;
    left:10%;
    width:80%;
    height:80px;
    border:2px solid rgba(255,255,255,0.3);
    border-radius:10px;
    z-index:998;
}

/* خط قرمز */

#line{
    position:absolute;
    top:50%;
    left:10%;
    width:80%;
    height:4px;
    background:red;
    box-shadow:0 0 15px red;
    z-index:999;
    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }

}

.detected{
    background:#00ff00 !important;
    box-shadow:0 0 20px #00ff00 !important;
}

input{
    width:90%;
    max-width:650px;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    font-size:22px;
    text-align:center;
}

.info{
    color:#ccc;
    margin-top:15px;
    line-height:1.9;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>اسکن حرفه‌ای بارکد و QR</h2>

<button onclick="startScanner()">
شروع اسکن
</button>

<br>

<input
type="text"
id="result"
placeholder="نتیجه اسکن"
/>

<br><br>

<div id="videoContainer">

    <video
        id="video"
        autoplay
        muted
        playsinline
    ></video>

    <div id="scanBox"></div>

    <div id="line"></div>

</div>

<div class="info">

بارکد را روی خط قرمز نگه دارید<br>
فاصله مناسب: حدود ۱۰ تا ۲۰ سانتی‌متر

</div>

</div>

<script>

let video;
let stream;
let detector;
let zxingReader;

async function startScanner(){

    try{

        video =
            document.getElementById("video");

        // باز کردن دوربین پشت

        stream =
            await navigator.mediaDevices.getUserMedia({

                video:{

                    facingMode:"environment",

                    width:{
                        ideal:1280
                    },

                    height:{
                        ideal:720
                    },

                    frameRate:{
                        ideal:30,
                        max:60
                    }

                },

                audio:false

            });

        video.srcObject = stream;

        await video.play();

        // فعال سازی autofocus و zoom

        const track =
            stream.getVideoTracks()[0];

        const capabilities =
            track.getCapabilities();

        try{

            if(capabilities.focusMode){

                await track.applyConstraints({

                    advanced:[{

                        focusMode:"continuous"

                    }]

                });

            }

        }
        catch(e){}

        try{

            if(capabilities.zoom){

                await track.applyConstraints({

                    advanced:[{

                        zoom:2

                    }]

                });

            }

        }
        catch(e){}

        // استفاده از BarcodeDetector

        if('BarcodeDetector' in window){

            detector =
                new BarcodeDetector({

                    formats:[

                        'ean_13',
                        'ean_8',
                        'upc_a',
                        'upc_e',
                        'code_128',
                        'code_39',
                        'itf',
                        'qr_code'

                    ]

                });

            detectLoop();

        }
        else{

            startZXing();

        }

    }
    catch(err){

        console.log(err);

        alert(
            "خطا در دسترسی به دوربین"
        );

    }

}

// حلقه تشخیص سریع

async function detectLoop(){

    try{

        const barcodes =
            await detector.detect(video);

        if(barcodes.length > 0){

            const code =
                barcodes[0].rawValue;

            onDetected(code);

        }

    }
    catch(err){

    }

    requestAnimationFrame(detectLoop);

}

// fallback

function startZXing(){

    zxingReader =
        new ZXingBrowser.BrowserMultiFormatReader();

    zxingReader.decodeFromVideoElement(

        video,

        (result,err)=>{

            if(result){

                onDetected(result.text);

            }

        }

    );

}

function onDetected(code){

    document
        .getElementById("result")
        .value = code;

    const line =
        document.getElementById("line");

    line.classList.add("detected");

    navigator.vibrate?.(150);

    setTimeout(()=>{

        line.classList.remove("detected");

    },300);

}

</script>

</body>
</html>
