<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#111;
    color:white;
    font-family:tahoma;
    text-align:center;
}

.container{
    padding:15px;
}

h2{
    margin-top:15px;
}

button{
    background:#e53935;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 24px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

#videoContainer{
    position:relative;
    width:95%;
    max-width:550px;
    margin:20px auto;
    overflow:hidden;
    border-radius:18px;
    background:black;
}

video{
    width:100%;
    height:auto;
    display:block;
    object-fit:cover;
}

/* خط قرمز اسکن */

#scanLine{
    position:absolute;
    top:50%;
    left:10%;
    width:80%;
    height:4px;
    background:red;
    box-shadow:0 0 15px red;
    z-index:999;
    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }

}

/* سبز شدن هنگام تشخیص */

.detected{
    background:#00ff00 !important;
    box-shadow:0 0 18px #00ff00 !important;
}

input{
    width:90%;
    max-width:550px;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}

.info{
    margin-top:15px;
    color:#ccc;
    line-height:1.8;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>اسکن زنده بارکد و QR</h2>

<button onclick="startScanner()">
شروع اسکن
</button>

<br><br>

<input
type="text"
id="result"
placeholder="نتیجه اسکن"
/>

<div id="videoContainer">

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

    <div id="scanLine"></div>

</div>

<div class="info">

بارکد را روی خط قرمز نگه دارید<br>
فاصله را کم و زیاد کنید تا فوکوس بهتر شود

</div>

</div>

<script>

let codeReader;

async function startScanner(){

    try{

        const video = document.getElementById("video");

        // باز کردن فقط دوربین پشت

        const stream =
            await navigator.mediaDevices.getUserMedia({

                video:{

                    facingMode:{
                        exact:"environment"
                    },

                    width:{
                        ideal:1280
                    },

                    height:{
                        ideal:720
                    }

                },

                audio:false

            });

        video.srcObject = stream;

        await video.play();

        codeReader =
            new ZXing.BrowserMultiFormatReader();

        codeReader.decodeFromVideoElement(

            video,

            (result, err) => {

                if(result){

                    document
                        .getElementById("result")
                        .value = result.text;

                    // سبز شدن خط

                    const line =
                        document.getElementById("scanLine");

                    line.classList.add("detected");

                    navigator.vibrate?.(150);

                    setTimeout(() => {

                        line.classList.remove("detected");

                    }, 400);

                }

            }

        );

    }
    catch(err){

        console.log(err);

        alert(
            "خطا در دسترسی به دوربین پشت"
        );

    }

}

</script>

</body>
</html>
