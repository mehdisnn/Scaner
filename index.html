<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>1D Barcode Scanner</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    text-align:center;
}

.container{
    padding:15px;
}

button{

    background:#e53935;
    color:white;

    border:none;

    border-radius:12px;

    padding:14px 24px;

    font-size:18px;

    cursor:pointer;

    margin:10px;

}

#scanner{

    position:relative;

    width:95%;
    max-width:700px;

    height:300px;

    margin:auto;

    overflow:hidden;

    border-radius:18px;

    background:black;

}

/* خط قرمز */

#line{

    position:absolute;

    top:50%;

    left:10%;

    width:80%;

    height:4px;

    background:red;

    box-shadow:0 0 18px red;

    z-index:999;

    animation:pulse 1s infinite;

}

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }

}

.detected{

    background:#00ff00 !important;

    box-shadow:0 0 20px #00ff00 !important;

}

input{

    width:90%;
    max-width:700px;

    padding:14px;

    margin-top:15px;

    border:none;

    border-radius:10px;

    font-size:24px;

    text-align:center;

}

.info{

    color:#ccc;

    margin-top:15px;

    line-height:1.9;

    font-size:14px;

}

video{

    width:100%;
    height:100%;
    object-fit:cover;

}

canvas{

    position:absolute;
    top:0;
    left:0;

}

</style>

</head>

<body>

<div class="container">

<h2>اسکن حرفه‌ای بارکد خطی</h2>

<button onclick="startScanner()">

شروع اسکن

</button>

<br>

<input
type="text"
id="result"
placeholder="نتیجه اسکن"
/>

<br><br>

<div id="scanner">

    <div id="line"></div>

</div>

<div class="info">

بارکد را افقی روی خط قرمز نگه دارید<br>
بهترین فاصله: ۸ تا ۱۵ سانتی‌متر

</div>

</div>

<script>

let detectedRecently = false;

function startScanner(){

    Quagga.init({

        inputStream:{

            type:"LiveStream",

            target:document.querySelector('#scanner'),

            constraints:{

                facingMode:"environment",

                width:{
                    ideal:1920
                },

                height:{
                    ideal:1080
                },

                aspectRatio:1.777

            },

            area:{

                top:"35%",
                right:"10%",
                left:"10%",
                bottom:"35%"

            }

        },

        locator:{

            patchSize:"x-large",

            halfSample:false

        },

        numOfWorkers:4,

        frequency:20,

        locate:true,

        decoder:{

            readers:[

                "code_128_reader",
                "ean_reader",
                "ean_8_reader",
                "upc_reader",
                "upc_e_reader",
                "code_39_reader",
                "codabar_reader",
                "i2of5_reader"

            ],

            multiple:false

        }

    },

    async function(err){

        if(err){

            console.log(err);

            alert("خطا در راه‌اندازی دوربین");

            return;

        }

        Quagga.start();

        enableCameraFeatures();

    });

    // هنگام تشخیص

    Quagga.onDetected(function(data){

        if(detectedRecently) return;

        detectedRecently = true;

        const code =
            data.codeResult.code;

        document
            .getElementById("result")
            .value = code;

        navigator.vibrate?.(150);

        // سبز شدن خط

        const line =
            document.getElementById("line");

        line.classList.add("detected");

        setTimeout(()=>{

            line.classList.remove("detected");

            detectedRecently = false;

        },1000);

    });

}

// autofocus و zoom

async function enableCameraFeatures(){

    try{

        const track =
            Quagga.CameraAccess.getActiveTrack();

        const capabilities =
            track.getCapabilities();

        const advanced = [];

        // فوکوس پیوسته

        if(capabilities.focusMode){

            advanced.push({

                focusMode:"continuous"

            });

        }

        // زوم

        if(capabilities.zoom){

            advanced.push({

                zoom:2

            });

        }

        await track.applyConstraints({

            advanced:advanced

        });

    }
    catch(e){

        console.log(e);

    }

}

</script>

</body>

</html>
