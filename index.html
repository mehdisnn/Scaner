<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Barcode Scanner</title>

<style>

body{

    margin:0;
    padding:15px;
    font-family:tahoma;
    direction:rtl;
    background:#f5f5f5;
    text-align:center;

}

/* ---------- دوربین ---------- */

#scanner-container{

    width:100%;
    display:flex;
    justify-content:center;
    margin-top:10px;

}

#scanner{

    width:95%;
    max-width:520px;
    height:340px;
    overflow:hidden;
    border-radius:18px;
    border:3px solid #ccc;
    background:black;

}

/* ---------- خط اسکن ---------- */

#line{

    width:95%;
    max-width:520px;
    height:5px;
    background:red;
    margin:10px auto 20px auto;
    border-radius:10px;
    transition:0.2s;

}

#line.detected{

    background:limegreen;

}

/* ---------- لیست ---------- */

#productList{

    margin-top:20px;

}

.product{

    background:white;
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);

}

/* ---------- بارکد ---------- */

.barcode{

    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;

}

/* ---------- نام کالا ---------- */

.product-name{

    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
    color:#333;

}

/* ---------- فیلدها ---------- */

.fields{

    display:flex;
    gap:10px;
    flex-wrap:wrap;

}

.field{

    flex:1;
    min-width:130px;

}

.field label{

    display:block;
    margin-bottom:6px;
    font-size:18px;
    font-weight:bold;

}

.field input{

    width:100%;
    height:70px;
    border:none;
    border-radius:12px;
    font-size:32px;
    text-align:center;
    font-weight:bold;
    color:white;

}

/* قیمت اصلی */

.original-price{

    background:#d32f2f;

}

/* قیمت تخفیفی */

.discount-price{

    background:#2e7d32;

}

/* تعداد */

.count-box{

    background:#1565c0;

}

</style>

</head>

<body>

<h2>

اسکن بارکد کالا

</h2>

<!-- دوربین -->

<div id="scanner-container">

    <div id="scanner"></div>

</div>

<!-- خط -->

<div id="line"></div>

<!-- لیست -->

<div id="productList"></div>

<!-- بوق -->

<audio id="beep">

<source
src="https://actions.google.com/sounds/v1/cartoon/beep_short.ogg">

</audio>

<!-- Quagga -->

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<script>

/* جلوگیری از اسکن پشت سر هم */

let detectedRecently = false;

/* ---------------- گوگل شیت ---------------- */

const SHEET_URL =
"https://opensheet.elk.sh/1SlLYHirdkf9xz0RlI7KBODmg7KeA_BhnUC-4Eo4j1Jc/Sheet1";

/* ---------------- راه‌اندازی دوربین ---------------- */
/* الگوریتم اصلی خودت بدون تغییر */

Quagga.init({

    inputStream:{

        name:"Live",

        type:"LiveStream",

        target:
            document.querySelector("#scanner"),

        constraints:{

            facingMode:"environment"

        }

    },

    decoder:{

        readers:[

            "ean_reader",

            "code_128_reader"

        ]

    }

},

async function(err){

    if(err){

        console.log(err);

        alert("خطا در راه‌اندازی دوربین");

        return;

    }

    Quagga.start();

    enableCameraFeatures();

});

/* ---------------- هنگام تشخیص ---------------- */
/* الگوریتم اصلی خودت بدون تغییر */

Quagga.onDetected(async function(data){

    if(detectedRecently) return;

    detectedRecently = true;

    const code =
        data.codeResult.code;

    console.log(code);

    /* بوق */

    const beep =
        document.getElementById("beep");

    beep.currentTime = 0;

    beep.play();

    /* خط سبز */

    const line =
        document.getElementById("line");

    line.classList.add("detected");

    /* دریافت اطلاعات */

    const product =
        await getProductFromSheet(code);

    /* افزودن به لیست */

    addProduct(product);

    /* ویبره */

    navigator.vibrate?.(150);

    setTimeout(()=>{

        line.classList.remove("detected");

        detectedRecently = false;

    },1000);

});

/* ---------------- خواندن گوگل شیت ---------------- */

async function getProductFromSheet(barcode){

    try{

        const response =
            await fetch(SHEET_URL);

        const data =
            await response.json();

        /* جستجو در ستون barcode */

        const item =
            data.find(x => x.barcode == barcode);

        if(item){

            return {

                barcode: barcode,

                name: item.name,

                originalPrice: item.originalPrice,

                discountPrice: item.discountPrice

            };

        }

    }

    catch(e){

        console.log(e);

    }

    return {

        barcode: barcode,

        name: "کالا یافت نشد",

        originalPrice: "-",

        discountPrice: "-"

    };

}

/* ---------------- افزودن محصول ---------------- */

function addProduct(product){

    const container =
        document.getElementById("productList");

    const div =
        document.createElement("div");

    div.className = "product";

    div.innerHTML = `

        <div class="barcode">

            ${product.barcode}

        </div>

        <div class="product-name">

            ${product.name}

        </div>

        <div class="fields">

            <div class="field">

                <label>

                    قیمت پشت کالا

                </label>

                <input

                    class="original-price"

                    value="${product.originalPrice}"

                    readonly

                >

            </div>

            <div class="field">

                <label>

                    قیمت تخفیفی

                </label>

                <input

                    class="discount-price"

                    value="${product.discountPrice}"

                    readonly

                >

            </div>

            <div class="field">

                <label>

                    تعداد

                </label>

                <input

                    class="count-box"

                    type="number"

                    value="1"

                >

            </div>

        </div>

    `;

    container.prepend(div);

}

/* ---------------- autofocus + zoom + flash ---------------- */
/* الگوریتم قبلی حفظ شده */

async function enableCameraFeatures(){

    try{

        const track =
            Quagga.CameraAccess.getActiveTrack();

        const capabilities =
            track.getCapabilities();

        const advanced = [];

        /* فوکوس پیوسته */

        if(capabilities.focusMode){

            advanced.push({

                focusMode:"continuous"

            });

        }

        /* زوم */

        if(capabilities.zoom){

            advanced.push({

                zoom:2

            });

        }

        /* روشن کردن فلش */

        if(capabilities.torch){

            advanced.push({

                torch:true

            });

        }

        await track.applyConstraints({

            advanced:advanced

        });

    }

    catch(e){

        console.log(e);

    }

}

</script>

</body>

</html>
