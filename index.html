<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<title>Barcode POS</title>

<style>
body{
    font-family: sans-serif;
    direction: rtl;
    padding: 10px;
}

#scanner{
    width: 100%;
    height: 250px;
    border: 2px solid #ccc;
    margin-bottom: 10px;
}

#line{
    height: 3px;
    background: red;
    margin: 10px 0;
    transition: 0.2s;
}

#line.detected{
    background: green;
}

.item{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-bottom: 1px solid #eee;
}

.item img{
    width: 40px;
    height: 40px;
    background: #ddd;
}

.item-info{
    flex: 1;
}

.item input{
    width: 100px;
}
</style>
</head>

<body>

<h3>اسکن بارکد</h3>

<div id="scanner"></div>
<div id="line"></div>

<input id="result" placeholder="بارکد" readonly />

<h3>لیست محصولات</h3>
<div id="productList"></div>

<audio id="beepSound">
    <source src="beep.mp3" type="audio/mpeg">
</audio>

<!-- Quagga -->
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<script>

let detectedRecently = false;

// -------------------- شروع اسکن --------------------
Quagga.init({
    inputStream: {
        type: "LiveStream",
        target: document.querySelector("#scanner"),
        constraints: {
            facingMode: "environment"
        }
    },
    decoder: {
        readers: ["ean_reader", "code_128_reader"]
    }
}, function(err){

    if(err){
        console.log(err);
        alert("خطا در راه‌اندازی دوربین");
        return;
    }

    Quagga.start();
    enableCameraFeatures();
});

// -------------------- هنگام تشخیص --------------------
Quagga.onDetected(function(data){

    if(detectedRecently) return;
    detectedRecently = true;

    const code = data.codeResult.code;

    document.getElementById("result").value = code;

    // 🔊 بوق تایید
    const beep = document.getElementById("beepSound");
    beep.currentTime = 0;
    beep.play();

    // 🔥 اطلاعات محصول (فعلاً نمونه)
    const product = getProductInfo(code);

    addProductToList(product);

    // 📳 ویبره
    navigator.vibrate?.(150);

    // خط سبز
    const line = document.getElementById("line");
    line.classList.add("detected");

    setTimeout(()=>{
        line.classList.remove("detected");
        detectedRecently = false;
    }, 1000);
});

// -------------------- اطلاعات محصول (نمونه) --------------------
function getProductInfo(barcode){
    return {
        code: barcode,
        name: "محصول " + barcode,
        image: "https://via.placeholder.com/40"
    };
}

// -------------------- افزودن به لیست --------------------
function addProductToList(product){

    const container = document.getElementById("productList");

    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
        <img src="${product.image}" />
        
        <div class="item-info">
            <div>${product.name}</div>
            <small>کد: ${product.code}</small>
        </div>

        <input type="number" placeholder="قیمت" />
    `;

    container.appendChild(item);
}

// -------------------- فوکوس و زوم دوربین --------------------
async function enableCameraFeatures(){

    try{

        const track = Quagga.CameraAccess.getActiveTrack();
        const capabilities = track.getCapabilities();
        const advanced = [];

        if(capabilities.focusMode){
            advanced.push({ focusMode: "continuous" });
        }

        if(capabilities.zoom){
            advanced.push({ zoom: 2 });
        }

        await track.applyConstraints({
            advanced: advanced
        });

    } catch(e){
        console.log(e);
    }
}

</script>

</body>
</html>
