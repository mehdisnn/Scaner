<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    text-align:center;
}

.container{
    padding:15px;
}

h2{
    margin-top:10px;
}

button{
    background:#e53935;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 24px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#videoContainer{
    position:relative;
    width:95%;
    max-width:550px;
    margin:auto;
    border-radius:16px;
    overflow:hidden;
    background:black;
}

video{
    width:100%;
    height:auto;
    display:block;
}

/* خط اسکن */

#line{
    position:absolute;
    top:50%;
    left:10%;
    width:80%;
    height:4px;
    background:red;
    box-shadow:0 0 15px red;
    z-index:999;
    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }

}

.detected{
    background:#00ff00 !important;
    box-shadow:0 0 20px #00ff00 !important;
}

input{
    width:90%;
    max-width:550px;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}

.info{
    color:#ccc;
    margin-top:15px;
    line-height:1.8;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>اسکن زنده بارکد و QR</h2>

<button onclick="startScanner()">
شروع اسکن
</button>

<input
type="text"
id="result"
placeholder="نتیجه اسکن"
/>

<br><br>

<select id="cameraSelect"></select>

<br><br>

<div id="videoContainer">

    <video
        id="video"
        autoplay
        muted
        playsinline
    ></video>

    <div id="line"></div>

</div>

<div class="info">

بارکد را روی خط قرمز نگه دارید<br>
بهتر است نور کافی باشد

</div>

</div>

<script>

let codeReader;
let selectedDeviceId = null;

async function loadCameras(){

    try{

        const devices =
            await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();

        const select =
            document.getElementById("cameraSelect");

        select.innerHTML = "";

        devices.forEach((device,index)=>{

            const option =
                document.createElement("option");

            option.value = device.deviceId;

            option.text =
                device.label || ("Camera " + index);

            // انتخاب خودکار دوربین پشت

            const label =
                option.text.toLowerCase();

            if(
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ){
                selectedDeviceId = device.deviceId;
            }

            select.appendChild(option);

        });

        if(!selectedDeviceId && devices.length){

            // آخرین دوربین معمولا پشت است

            selectedDeviceId =
                devices[devices.length - 1].deviceId;

        }

        select.value = selectedDeviceId;

        select.onchange = ()=>{

            selectedDeviceId = select.value;

        };

    }
    catch(err){

        alert("خطا در خواندن دوربین‌ها");

        console.log(err);

    }

}

async function startScanner(){

    try{

        if(codeReader){

            codeReader.reset();

        }

        const video =
            document.getElementById("video");

        codeReader =
            new ZXingBrowser.BrowserMultiFormatReader();

        await codeReader.decodeFromVideoDevice(

            selectedDeviceId,
            video,

            (result,err)=>{

                if(result){

                    document
                        .getElementById("result")
                        .value = result.text;

                    const line =
                        document.getElementById("line");

                    line.classList.add("detected");

                    navigator.vibrate?.(200);

                    setTimeout(()=>{

                        line.classList.remove("detected");

                    },500);

                }

            }

        );

    }
    catch(err){

        alert(
            "اجازه دوربین داده نشده یا Chrome نیست"
        );

        console.log(err);

    }

}

loadCameras();

</script>

</body>
</html>
