<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Barcode Scanner</title>

<!-- ZXING -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:tahoma;
    text-align:center;
}

.container{
    padding:15px;
}

button{
    background:#e53935;
    color:white;
    border:none;
    border-radius:10px;
    padding:14px 22px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

#videoContainer{
    position:relative;
    width:100%;
    max-width:500px;
    margin:20px auto;
    border-radius:16px;
    overflow:hidden;
    background:black;
}

video{
    width:100%;
    height:auto;
    display:block;
}

/* خط قرمز اسکن /
#scanLine{
    position:absolute;
    top:50%;
    left:10%;
    width:80%;
    height:3px;
    background:red;
    box-shadow:0 0 12px red;
    z-index:1000;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/ وقتی بارکد پیدا شد */
.detected{
    background:#00ff00 !important;
    box-shadow:0 0 15px #00ff00 !important;
}

input{
    width:90%;
    max-width:500px;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}

.info{
    color:#ccc;
    margin-top:15px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="container">

<h2>اسکن زنده بارکد و QR</h2>

<button onclick="startScanner()">شروع اسکن</button>

<br><br>

<input type="text" id="result" placeholder="نتیجه اسکن">

<div id="videoContainer">

    <video id="video" muted playsinline></video>

    <div id="scanLine"></div>

</div>

<div class="info">

بارکد را روی خط قرمز نگه دارید<br>
اگر اسکن نشد فاصله را کمتر کنید

</div>

</div>

<script>

let codeReader = null;

async function startScanner(){

    try{

        const video = document.getElementById("video");

        codeReader = new ZXing.BrowserMultiFormatReader();

        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();

        let selectedDeviceId = devices[0].deviceId;

        // انتخاب دوربین پشت
        devices.forEach(device => {

            const label = device.label.toLowerCase();

            if(
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ){
                selectedDeviceId = device.deviceId;
            }

        });

        codeReader.decodeFromVideoDevice(

            selectedDeviceId,
            video,

            (result, err) => {

                if(result){

                    document.getElementById("result").value = result.text;

                    // سبز شدن خط هنگام تشخیص
                    const line = document.getElementById("scanLine");

                    line.classList.add("detected");

                    navigator.vibrate?.(150);

                    setTimeout(() => {
                        line.classList.remove("detected");
                    }, 500);

                }

            }

        );

    }
    catch(e){

        alert("خطا در دسترسی به دوربین");

        console.log(e);

    }

}

</script>

</body>
</html>
